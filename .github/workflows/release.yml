name: Release

on:
  # Manual trigger: creates tag v<manifest.version> from the default branch and a matching release.
  workflow_dispatch:
  # Automatic: someone pushed a v* tag (e.g. via `make release`); create the release for it.
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/bedrock_ha_agent/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: v$VERSION"

      - name: Guard — tag name matches manifest on tag-push trigger
        if: github.event_name == 'push'
        run: |
          PUSHED_TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="v${{ steps.version.outputs.version }}"
          if [ "$PUSHED_TAG" != "$EXPECTED" ]; then
            echo "::error::Pushed tag $PUSHED_TAG does not match manifest version $EXPECTED"
            exit 1
          fi

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists — bump manifest.json first"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Extract CHANGELOG section for release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Pull the section between `## <VERSION>` and the next `## ` heading.
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver { grab=1; next }
            grab && $0 ~ "^## " { exit }
            grab { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release of v$VERSION" > release_notes.md
          fi
          {
            echo 'body<<NOTES_EOF'
            cat release_notes.md
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: false
