name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install ruff
        run: pip install "ruff>=0.5.0"
      - name: Ruff check
        run: ruff check .

  typecheck:
    name: Mypy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install system libraries
        # PyTurboJPEG (needed by HA's camera component that our vision.py imports) is a
        # ctypes wrapper around libturbojpeg; the Python wheel doesn't bundle the native lib.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libturbojpeg0-dev
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Mypy (strict)
        run: mypy custom_components/bedrock_ha_agent/

  hassfest:
    name: HA hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs-validate:
    name: HACS validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  test:
    name: Tests (HA floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libturbojpeg0-dev
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run tests with coverage
        run: pytest tests/ --cov=custom_components.bedrock_ha_agent --cov-report=term-missing

  test-latest:
    name: Tests (HA latest) [non-blocking]
    runs-on: ubuntu-latest
    # Signals drift against HA's nightly without blocking merges — reviewer
    # investigates if this goes red.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libturbojpeg0-dev
      - name: Install dependencies (override HA to latest)
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install --upgrade homeassistant pytest-homeassistant-custom-component
      - name: Run tests
        run: pytest tests/ -q
